app-id: co.anysphere.cursor
runtime: org.freedesktop.Sdk
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
command: cursor
tags: [proprietary]
separate-locales: false
finish-args:
  - --require-version=0.10.3
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=ssh-auth
  - --device=all
  - --allow=devel
  - --filesystem=host
  - --env=NPM_CONFIG_GLOBALCONFIG=/app/etc/npmrc
  - --env=LD_LIBRARY_PATH=/app/lib
  # required to fix cursor scaling on wayland
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --system-talk-name=org.freedesktop.login1
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=com.canonical.AppMenu.Registrar.*
add-extensions:
  com.visualstudio.code.tool:
    directory: tools
    subdirectories: true
    version: "25.08"
    add-ld-path: lib
    no-autodownload: true
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/gtk-doc
  - '*.la'
modules:
  - name: cursor
    buildsystem: simple
    build-commands:
      - install -Dm755 cursor.sh /app/bin/cursor
      - |
        for s in 22 32 48 64 128 256 512; do
          install -Dm644 ${s}.png /app/share/icons/hicolor/${s}x${s}/apps/${FLATPAK_ID}.png
        done
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo
      - install -Dm644 ${FLATPAK_ID}.desktop -t /app/share/applications
      - install -Dm644 ${FLATPAK_ID}-url-handler.desktop -t /app/share/applications
      - install -Dm644 npmrc -t /app/etc
      - install -Dm644 flatpak-warning.txt -t /app/share/cursor
      - install -D apply_extra -t /app/bin
      - cp /usr/bin/ar -t /app/bin
      - mkdir /app/tools
    sources:
      - type: extra-data
        filename: cursor.deb
        only-arches: [x86_64]
        url: https://downloads.cursor.com/aptrepo/pool/stable/c/cu/cursor_3.1.14_amd64.deb
        sha256: d21b0c8c46a0eedf6d6946e15f9a20527786757ffa37b0189260607e4c6d9134
        size: 182645892
      - type: extra-data
        filename: cursor.deb
        only-arches: [aarch64]
        url: https://downloads.cursor.com/aptrepo/pool/stable/c/cu/cursor_3.1.14_arm64.deb
        sha256: 2215149053e128c0c89112de86999370da01b1e7eb447f8328e0dd7bc1dae48b
        size: 172952032
      - type: file
        path: apply_extra
      - type: file
        path: cursor.sh
      - type: file
        path: flatpak-warning.txt
      - type: file
        path: npmrc
      - type: file
        path: co.anysphere.cursor.metainfo.xml
      - type: file
        path: co.anysphere.cursor.desktop
      - type: file
        path: co.anysphere.cursor-url-handler.desktop
      - type: file
        path: icons/22.png
      - type: file
        path: icons/24.png
      - type: file
        path: icons/32.png
      - type: file
        path: icons/48.png
      - type: file
        path: icons/64.png
      - type: file
        path: icons/128.png
      - type: file
        path: icons/256.png
      - type: file
        path: icons/512.png

  - name: kerberos
    subdir: src
    build-options:
      cflags: -std=gnu17 -Wno-error=incompatible-pointer-types -Wno-error=int-conversion -Wno-error=implicit-function-declaration -Wno-error=implicit-int
    post-install:
      - install -Dm644 ../krb5.conf /app/etc/krb5.conf
    sources:
      - type: git
        url: https://github.com/krb5/krb5.git
        tag: krb5-1.22.2-final
        commit: 8570e77819563e036027e1da789d08ec9333ed4d
      - type: patch
        path: krb5-autoconf-2.73.patch
      - type: shell
        commands:
          - cd src && autoreconf -ivf
      - type: file
        path: krb5.conf

  - name: host-spawn
    buildsystem: simple
    build-commands:
      - install -Dm755 host-spawn /app/bin/host-spawn
    sources:
      - type: file
        url: https://github.com/1player/host-spawn/releases/download/v1.6.2/host-spawn-x86_64
        sha256: 077bc09a087292447ba17cfe2156a93f71bf56c4c6be8e38d3abe65c1240f34c
        dest-filename: host-spawn
        only-arches: [x86_64]

      - type: file
        url: https://github.com/1player/host-spawn/releases/download/v1.6.2/host-spawn-aarch64
        sha256: 8b30215b0b6b66c8c34a3e22d372dd39020295cd0904608bc2c5f5ecff829e5f
        dest-filename: host-spawn
        only-arches: [aarch64]
