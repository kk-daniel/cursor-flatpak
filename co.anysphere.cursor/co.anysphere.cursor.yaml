app-id: co.anysphere.cursor
runtime: org.freedesktop.Sdk
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
command: cursor
tags: [proprietary]
separate-locales: false
finish-args:
  - --require-version=0.10.3
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=ssh-auth
  - --device=all
  - --allow=devel
  - --filesystem=host
  - --env=NPM_CONFIG_GLOBALCONFIG=/app/etc/npmrc
  - --env=LD_LIBRARY_PATH=/app/lib
  # required to fix cursor scaling on wayland
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --system-talk-name=org.freedesktop.login1
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=com.canonical.AppMenu.Registrar.*
add-extensions:
  com.visualstudio.code.tool:
    directory: tools
    subdirectories: true
    version: "25.08"
    add-ld-path: lib
    no-autodownload: true
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/gtk-doc
  - '*.la'
modules:
  - name: cursor
    buildsystem: simple
    build-commands:
      - install -Dm755 cursor.sh /app/bin/cursor
      - |
        for s in 22 32 48 64 128 256 512; do
          install -Dm644 ${s}.png /app/share/icons/hicolor/${s}x${s}/apps/${FLATPAK_ID}.png
        done
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo
      - install -Dm644 ${FLATPAK_ID}.desktop -t /app/share/applications
      - install -Dm644 ${FLATPAK_ID}-url-handler.desktop -t /app/share/applications
      - install -Dm644 npmrc -t /app/etc
      - install -Dm644 flatpak-warning.txt -t /app/share/cursor
      - install -D apply_extra verify-appimage.sh -t /app/bin
      - cp /usr/bin/ar -t /app/bin
      - ARCH_TRIPLE=$(gcc --print-multiarch) && cp /usr/lib/${ARCH_TRIPLE}/libbfd-*.so /app/lib
      - ARCH_TRIPLE=$(gcc --print-multiarch) && cp /usr/lib/${ARCH_TRIPLE}/libsframe* /app/lib
      - ARCH_TRIPLE=$(gcc --print-multiarch) && ln -s /usr/lib/${ARCH_TRIPLE}/libtinfo.so/app/lib/libtinfo.so.5
      - mkdir /app/tools
    sources:
      - type: extra-data
        filename: appimage
        url: https://downloads.cursor.com/production/a80ff7dfcaa45d7750f6e30be457261379c29b06/linux/x64/Cursor-3.0.12-x86_64.AppImage
        sha256: 754005d7c878f27ccb5bea6370019e63473b8d955bc03ff771e733657c4a26fd
        size: 278485496
      - type: extra-data
        filename: anysphere.asc
        url: https://downloads.cursor.com/keys/anysphere.asc
        sha256: 9d2adcc95efdf65e6e76f964968734551ab70181634781f9d5952b271895ec03
        size: 1656
      - type: file
        path: apply_extra
      - type: file
        path: verify-appimage.sh
      - type: file
        path: cursor.sh
      - type: file
        path: flatpak-warning.txt
      - type: file
        path: npmrc
      - type: file
        path: co.anysphere.cursor.metainfo.xml
      - type: file
        path: co.anysphere.cursor.desktop
      - type: file
        path: co.anysphere.cursor-url-handler.desktop
      - type: file
        path: icons/22.png
      - type: file
        path: icons/24.png
      - type: file
        path: icons/32.png
      - type: file
        path: icons/48.png
      - type: file
        path: icons/64.png
      - type: file
        path: icons/128.png
      - type: file
        path: icons/256.png
      - type: file
        path: icons/512.png
    modules:
      - ../shared-modules/squashfs-tools/squashfs-tools.json

  - name: kerberos
    subdir: src
    post-install:
      - install -Dm644 ../krb5.conf /app/etc/krb5.conf
    sources:
      - type: git
        url: https://github.com/krb5/krb5.git
        tag: krb5-1.22.2-final
        commit: 8570e77819563e036027e1da789d08ec9333ed4d
      - type: file
        path: krb5.conf

  - name: host-spawn
    buildsystem: simple
    build-commands:
      - install -Dm755 host-spawn /app/bin/host-spawn
    sources:
      - type: file
        url: https://github.com/1player/host-spawn/releases/download/v1.6.1/host-spawn-x86_64
        sha256: 733746ab498e07d065cbecf80bacd447eb21846d1462e8fe23fdd9d9dc977b50
        dest-filename: host-spawn
        only-arches: [x86_64]

      - type: file
        url: https://github.com/1player/host-spawn/releases/download/v1.6.1/host-spawn-aarch64
        sha256: 71b7744a4d0b29279523cc0f0ed1a7af5e9555510bd9e6d4685391b59faefaac
        dest-filename: host-spawn
        only-arches: [aarch64]
